name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CGO_ENABLED: 0
  BINARY: peerygg

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build:
          - name: linux-amd64
            os: linux
            arch: amd64
          - name: linux-arm64
            os: linux
            arch: arm64
          - name: linux-mipsle
            os: linux
            arch: mipsle
            go: '1.20'
            gomips: softfloat
          - name: linux-mips
            os: linux
            arch: mips
            go: '1.20'
            gomips: softfloat
          - name: windows-amd64
            os: windows
            arch: amd64
            go: '1.20'
          - name: windows-i686
            os: windows
            arch: 386
            go: '1.20'
          - name: darwin-amd64
            os: darwin
            arch: amd64
          - name: darwin-arm64
            os: darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.build.go }}

      - name: Build ${{ matrix.build.name }}
        env:
          GOOS: ${{ matrix.build.os }}
          GOARCH: ${{ matrix.build.arch }}
          GOMIPS: ${{ matrix.build.gomips || '' }}
          GOMAXPROCS: 1
        run: |
          mkdir -p build
          OUTPUT_NAME="build/${BINARY}"
          [ "${{ matrix.build.os }}" = "windows" ] && OUTPUT_NAME="${OUTPUT_NAME}.exe"
          go build -o "${OUTPUT_NAME}" .
          ls -lh "${OUTPUT_NAME}"

      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET_NAME="${BINARY}-${TAG}-${{ matrix.build.name }}"
          STAGING="${RUNNER_TEMP}/${ASSET_NAME}"
          mkdir -p "${STAGING}"
          
          if [[ "${{ matrix.build.os }}" == *"windows"* ]]; then
            EXE_EXT=".exe"
            ARCHIVE_EXT=".zip"
            COMPRESS_CMD="7z a ${ASSET_NAME}${ARCHIVE_EXT} ${ASSET_NAME}"
          else
            EXE_EXT=""
            ARCHIVE_EXT=".tar.gz"
            COMPRESS_CMD="tar czf ${ASSET_NAME}${ARCHIVE_EXT} ${ASSET_NAME}"
          fi
          
          cp "build/${BINARY}${EXE_EXT}" "${STAGING}/"
          cp README.md LICENSE "${STAGING}/" 2>/dev/null || true
          
          cd "${RUNNER_TEMP}"
          $COMPRESS_CMD
          
          # Generate per-asset SHA256 checksum file (consistent format for both tools)
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ASSET_NAME}${ARCHIVE_EXT}" | awk '{print $1 "  " $2}' > "${ASSET_NAME}${ARCHIVE_EXT}.sha256"
          elif command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${ASSET_NAME}${ARCHIVE_EXT}" | awk '{print $1 "  " $2}' > "${ASSET_NAME}${ARCHIVE_EXT}.sha256"
          fi
          
          echo "ASSET=${ASSET_NAME}${ARCHIVE_EXT}" >> "$GITHUB_ENV"
          echo "ASSET_PATH=${RUNNER_TEMP}/${ASSET_NAME}${ARCHIVE_EXT}" >> "$GITHUB_ENV"
          echo "CHECKSUM_PATH=${RUNNER_TEMP}/${ASSET_NAME}${ARCHIVE_EXT}.sha256" >> "$GITHUB_ENV"


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: |
            ${{ env.ASSET_PATH }}
            ${{ env.CHECKSUM_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
